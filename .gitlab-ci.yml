# CI for React apps (devctl). Build/test on push; create tag + GitLab release on merge to main
# when the merged MR title is "Release vX.Y.Z" (see Devctl.md §5).
# No manual CI variable: job uses CI_JOB_TOKEN. Optional: GITLAB_TOKEN or RELEASE_TOKEN.

stages:
  - test
  - release

# --- Test (all branches) ---
test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pnpm
    paths:
      - .pnpm-store
  variables:
    PNPM_HOME: "/pnpm"
  before_script:
    - corepack enable && pnpm install --frozen-lockfile
  script:
    - pnpm run lint
    - pnpm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# --- Release: tag + GitLab release when "Release vX.Y.Z" MR is merged into main ---
# Uses CI_JOB_TOKEN (no manual variable). Optional: GITLAB_TOKEN or RELEASE_TOKEN.
release:
  stage: release
  image: alpine:latest
  before_script: []   # no Node/Go; job only needs curl/jq
  rules:
    - if: $CI_COMMIT_BRANCH != "main"
      when: never
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  script:
    - apk add --no-cache curl jq
    - |
      if [ -n "${RELEASE_TOKEN:-$GITLAB_TOKEN}" ]; then
        AUTH_HEADER="PRIVATE-TOKEN: ${RELEASE_TOKEN:-$GITLAB_TOKEN}"
      else
        AUTH_HEADER="JOB-TOKEN: ${CI_JOB_TOKEN}"
      fi
      API="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"
      MR_JSON=$(curl -s -H "$AUTH_HEADER" \
        "${API}/merge_requests?state=merged&target_branch=main&order_by=updated_at&per_page=1")
      TITLE=$(echo "$MR_JSON" | jq -r '.[0].title // empty')
      MERGE_SHA=$(echo "$MR_JSON" | jq -r '.[0].merge_commit_sha // empty')
      if [ "$MERGE_SHA" != "$CI_COMMIT_SHA" ]; then
        echo "Latest merged MR merge_commit_sha ($MERGE_SHA) != CI_COMMIT_SHA ($CI_COMMIT_SHA); skip."
        exit 0
      fi
      TAG_NAME=$(echo "$TITLE" | sed -n 's/^Release[[:space:]]*\(v[0-9][0-9.]*[^[:space:]]*\)[[:space:]]*$/\1/p')
      if [ -z "$TAG_NAME" ]; then
        echo "MR title does not match 'Release vX.Y.Z': $TITLE"
        exit 0
      fi
      if curl -s -o /dev/null -w "%{http_code}" -H "$AUTH_HEADER" \
        "${API}/repository/tags/${TAG_NAME}" | grep -q 200; then
        echo "Tag $TAG_NAME already exists; skip."
        exit 0
      fi
      echo "Creating tag $TAG_NAME at $CI_COMMIT_SHA and release."
      curl -s -X POST -H "$AUTH_HEADER" -H "Content-Type: application/json" \
        -d "{\"tag_name\":\"${TAG_NAME}\",\"ref\":\"${CI_COMMIT_SHA}\",\"description\":\"Release ${TAG_NAME}\"}" \
        "${API}/releases"
      echo "Done: tag and release $TAG_NAME created."
